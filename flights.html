<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Fare Finder — BOS nonstop, next 12 months</title>
<link rel="icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<style>
  :root{
    --bg:#e8ebee; --card:#ffffff; --board:#0e1317; --board-ink:#f2ede0;
    --ink:#141a1f; --muted:#59636d; --faint:#8b95a0;
    --hair:#dde2e7; --hair-strong:#c9d0d7;
    --amber:#b8791f; --amber-soft:#f6ecd7;
    --ie:#1f7d4d; --ie-soft:#e2f0e8;
    --sf:#c33f28; --sf-soft:#fbe6e0;
    --ac:var(--ie); --ac-soft:var(--ie-soft);
    --shadow:0 1px 2px rgba(20,30,40,.06),0 18px 46px rgba(20,30,40,.09);
    --shadow-sm:0 1px 2px rgba(20,30,40,.06),0 6px 18px rgba(20,30,40,.07);
    --cond:"Barlow Condensed",system-ui,sans-serif;
    --sans:"Archivo",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0a0d0f; --card:#151a1f; --board:#080b0d; --board-ink:#f3edde;
      --ink:#eef2f5; --muted:#98a2ac; --faint:#6b757f;
      --hair:#252c33; --hair-strong:#333c44;
      --amber:#e8bd6a; --amber-soft:#2c2412;
      --ie:#57c089; --ie-soft:#15271d;
      --sf:#f2704f; --sf-soft:#2e1712;
      --shadow:0 1px 2px rgba(0,0,0,.5),0 20px 50px rgba(0,0,0,.45);
      --shadow-sm:0 1px 2px rgba(0,0,0,.4),0 8px 22px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#e8ebee; --card:#ffffff; --board:#0e1317; --board-ink:#f2ede0;
    --ink:#141a1f; --muted:#59636d; --faint:#8b95a0; --hair:#dde2e7; --hair-strong:#c9d0d7;
    --amber:#b8791f; --amber-soft:#f6ecd7; --ie:#1f7d4d; --ie-soft:#e2f0e8; --sf:#c33f28; --sf-soft:#fbe6e0;
    --shadow:0 1px 2px rgba(20,30,40,.06),0 18px 46px rgba(20,30,40,.09);
    --shadow-sm:0 1px 2px rgba(20,30,40,.06),0 6px 18px rgba(20,30,40,.07);
  }
  :root[data-theme="dark"]{
    --bg:#0a0d0f; --card:#151a1f; --board:#080b0d; --board-ink:#f3edde;
    --ink:#eef2f5; --muted:#98a2ac; --faint:#6b757f; --hair:#252c33; --hair-strong:#333c44;
    --amber:#e8bd6a; --amber-soft:#2c2412; --ie:#57c089; --ie-soft:#15271d; --sf:#f2704f; --sf-soft:#2e1712;
    --shadow:0 1px 2px rgba(0,0,0,.5),0 20px 50px rgba(0,0,0,.45);
    --shadow-sm:0 1px 2px rgba(0,0,0,.4),0 8px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .wrap{max-width:1080px;margin:0 auto;padding:0 clamp(14px,4vw,26px) clamp(40px,6vw,72px)}
  a{color:var(--ac)}

  /* ---------- masthead / departure board ---------- */
  .board{background:var(--board);color:var(--board-ink);margin:0 calc(-1*clamp(14px,4vw,26px));
    padding:clamp(18px,4vw,26px) clamp(14px,4vw,26px) clamp(20px,4vw,28px);
    border-radius:0 0 20px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .board::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 2px,transparent 2px 4px)}
  .board-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--amber);font-weight:500}
  .board h1{font-family:var(--cond);font-weight:700;font-size:clamp(30px,7.5vw,54px);line-height:.94;
    letter-spacing:.01em;margin:.28em 0 .14em;text-transform:uppercase}
  .board .sub{color:#c4ccd2;font-size:clamp(13px,2.6vw,15px);max-width:52ch}
  .board .sub b{color:var(--board-ink);font-weight:600}
  .theme-btn{flex:none;background:rgba(255,255,255,.07);color:var(--board-ink);border:1px solid rgba(255,255,255,.16);
    border-radius:999px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    padding:7px 13px;cursor:pointer;transition:background .18s}
  .theme-btn:hover{background:rgba(255,255,255,.14)}

  /* ---------- route gates ---------- */
  .gates{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:clamp(16px,3.5vw,22px) 0 clamp(20px,4vw,30px)}
  .gate{--gac:var(--ie);text-align:left;background:var(--card);border:1px solid var(--hair);
    border-radius:15px;padding:15px 17px;cursor:pointer;box-shadow:var(--shadow-sm);min-width:0;
    display:flex;align-items:center;gap:14px;transition:transform .16s,border-color .16s,box-shadow .16s;position:relative}
  .gate .g-city{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gate:hover{transform:translateY(-2px)}
  .gate .flag{font-size:30px;line-height:1;flex:none;filter:saturate(1.05)}
  .gate .g-main{min-width:0;flex:1}
  .gate .g-route{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
  .gate .g-city{font-family:var(--cond);font-weight:700;font-size:24px;line-height:1.02;text-transform:uppercase;letter-spacing:.01em}
  .gate .g-price{font-family:var(--mono);font-weight:600;font-size:15px;color:var(--gac);white-space:nowrap}
  .gate .g-price small{color:var(--muted);font-weight:400;font-size:11px}
  .gate[aria-selected="true"]{border-color:var(--gac);box-shadow:0 0 0 1.5px var(--gac),var(--shadow-sm)}
  .gate[aria-selected="true"]::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;
    border-radius:0 4px 4px 0;background:var(--gac)}
  .gate:focus-visible{outline:2px solid var(--ac);outline-offset:2px}

  /* ---------- boarding pass ---------- */
  .pass{background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--hair);
    overflow:hidden;margin-bottom:clamp(16px,3vw,22px)}
  .pass-stub{background:var(--board);color:var(--board-ink);padding:9px clamp(16px,3vw,24px);
    display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .pass-stub .lbl{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber)}
  .pass-stub .stamp{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--board-ink);border:1px solid rgba(255,255,255,.28);border-radius:5px;padding:3px 8px}
  .pass-body{padding:clamp(18px,3.4vw,28px) clamp(16px,3vw,26px)}
  .route-line{display:flex;align-items:center;gap:clamp(10px,3vw,26px);flex-wrap:wrap}
  .port{text-align:center;flex:none}
  .port .code{font-family:var(--cond);font-weight:700;font-size:clamp(40px,10vw,66px);line-height:.86;letter-spacing:.01em}
  .port .name{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .path{flex:1;min-width:120px;display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--ac)}
  .path .dur{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em}
  .path .track{position:relative;width:100%;height:2px;background:var(--hair-strong);border-radius:2px}
  .path .track::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:7px;height:7px;
    border-radius:50%;background:var(--ac)}
  .path .plane{position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:15px;line-height:1}
  .path .nonstop{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ac);font-weight:500}
  .fare{flex:none;text-align:right;margin-left:auto}
  .fare .amt{font-family:var(--cond);font-weight:700;font-size:clamp(44px,11vw,72px);line-height:.84;color:var(--ac);letter-spacing:.005em}
  .fare .amt.flip{animation:flip .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes flip{0%{transform:rotateX(-88deg);opacity:0;filter:blur(1px)}55%{opacity:1}100%{transform:none;filter:none}}
  .fare .meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
  .fare .meta b{color:var(--ink);font-weight:600}

  .perf{border:none;border-top:2px dashed var(--hair-strong);margin:clamp(16px,3vw,22px) -8px;position:relative}
  .segs{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .seg{display:flex;gap:12px;align-items:baseline}
  .seg .dir{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);flex:none;width:58px;padding-top:2px}
  .seg .when{font-family:var(--cond);font-weight:600;font-size:20px;text-transform:uppercase;line-height:1.05}
  .seg .when .time{color:var(--ac)}
  .seg .fl{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}

  /* ---------- stat strip ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:clamp(20px,3.4vw,28px)}
  .stat{background:var(--card);border:1px solid var(--hair);border-radius:13px;padding:13px 15px;box-shadow:var(--shadow-sm)}
  .stat .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .stat .v{font-family:var(--cond);font-weight:700;font-size:clamp(20px,4vw,26px);line-height:1.05;margin-top:3px}
  .stat .v small{font-family:var(--sans);font-weight:500;font-size:12px;color:var(--muted)}

  /* ---------- section headings ---------- */
  .sec{margin:clamp(26px,4.5vw,40px) 0 clamp(12px,2vw,16px);display:flex;align-items:baseline;gap:12px}
  .sec h2{font-family:var(--cond);font-weight:700;font-size:clamp(20px,4vw,27px);text-transform:uppercase;letter-spacing:.02em;margin:0}
  .sec .note{font-size:12.5px;color:var(--muted)}

  /* ---------- month chart ---------- */
  .chartcard{background:var(--card);border:1px solid var(--hair);border-radius:15px;padding:clamp(14px,2.6vw,22px);box-shadow:var(--shadow-sm)}
  .chart{display:grid;grid-template-columns:repeat(12,1fr);gap:clamp(4px,1vw,9px);align-items:end;height:200px;margin-bottom:8px}
  .col{position:relative;min-width:0;height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;cursor:default}
  .bar{position:relative;width:100%;max-width:38px;background:var(--ac);border-radius:4px 4px 0 0;min-height:3px;
    transition:height .5s cubic-bezier(.2,.7,.2,1),opacity .15s;opacity:.42}
  .col.cheapest .bar{opacity:1;box-shadow:inset 0 0 0 2px var(--card),0 0 0 1.5px var(--ac)}
  .col:hover .bar{opacity:.85}
  .col.cheapest:hover .bar{opacity:1}
  .blab{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);margin-bottom:5px;
    font-family:var(--mono);font-size:10px;color:var(--ac);font-weight:600;opacity:0;transition:opacity .2s;white-space:nowrap}
  .col.cheapest .blab{opacity:1}
  .xaxis{display:grid;grid-template-columns:repeat(12,1fr);gap:clamp(4px,1vw,9px);border-top:1px solid var(--hair);padding-top:7px}
  .xaxis span{font-family:var(--mono);font-size:9.5px;letter-spacing:.02em;color:var(--muted);text-align:center;text-transform:uppercase}
  .xaxis span b{display:block;color:var(--faint);font-weight:400;font-size:8.5px}
  .tip{position:fixed;z-index:20;pointer-events:none;background:var(--board);color:var(--board-ink);
    font-family:var(--mono);font-size:11.5px;padding:8px 11px;border-radius:8px;box-shadow:var(--shadow);
    opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s;max-width:230px;line-height:1.5}
  .tip.on{opacity:1;transform:none}
  .tip .tp{color:var(--amber);font-weight:600}

  /* ---------- cheap dates table ---------- */
  .tablecard{background:var(--card);border:1px solid var(--hair);border-radius:15px;box-shadow:var(--shadow-sm);overflow:hidden}
  .tbl-scroll{overflow-x:auto}
  table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:520px}
  thead th{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    text-align:left;font-weight:500;padding:11px 14px;border-bottom:1px solid var(--hair);background:var(--card);position:sticky;top:0}
  tbody td{padding:10px 14px;border-bottom:1px solid var(--hair)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--ac-soft)}
  td.price{font-family:var(--mono);font-weight:600;color:var(--ac)}
  td.dt{font-family:var(--cond);font-weight:600;font-size:15px;text-transform:uppercase}
  td.fl{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .pill{display:inline-block;font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:5px;
    background:var(--ac-soft);color:var(--ac);font-weight:500;border:1px solid transparent}

  /* ---------- notes ---------- */
  .notes{background:var(--card);border:1px solid var(--hair);border-left:3px solid var(--amber);
    border-radius:12px;padding:clamp(14px,2.6vw,20px);box-shadow:var(--shadow-sm);font-size:13px;color:var(--muted)}
  .notes h3{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin:0 0 10px}
  .notes ul{margin:0;padding-left:18px}
  .notes li{margin:6px 0}
  .notes b{color:var(--ink);font-weight:600}
  .foot{margin-top:26px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.04em}

  @media (max-width:560px){
    .gates{grid-template-columns:1fr}
    .gate .g-city{white-space:normal}
  }
  @media (max-width:640px){
    .stats{grid-template-columns:1fr 1fr}
    .segs{grid-template-columns:1fr}
    .fare{margin-left:0;text-align:left;width:100%}
    .fare .amt{font-size:56px}
    .route-line{gap:14px}
    .chart{height:160px}
    .xaxis span b{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>

<div class="wrap">
  <header class="board">
    <div class="board-top">
      <div>
        <div class="eyebrow">Boston Logan · Nonstop only · 5 nights</div>
        <h1>Fare Finder</h1>
      </div>
      <button class="theme-btn" id="themeBtn" type="button" aria-label="Toggle light or dark theme">Theme</button>
    </div>
    <p class="sub">Cheapest <b>nonstop</b> round trip that can seat <b>2 adults + 1 child</b> (3 seats), for a
      <b>5-night</b> stay, at any departure in the <b>next 12 months</b>. Pick a destination.</p>
  </header>

  <div class="gates" role="tablist" aria-label="Destination">
    <button class="gate" id="gate-dub" role="tab" data-route="dub"></button>
    <button class="gate" id="gate-sfo" role="tab" data-route="sfo"></button>
  </div>

  <main id="panel" role="tabpanel"></main>

  <div class="foot" id="foot"></div>
</div>

<div class="tip" id="tip" role="status" aria-live="polite"></div>

       </span>
       <span class="g-price">${money(r.cheapest.price)} <small>from</small></span>`;
    g.addEventListener("click",()=>select(key));
    g.addEventListener("keydown",e=>{
      if(e.key==="ArrowRight"||e.key==="ArrowLeft"){e.preventDefault(); select(key==="dub"?"sfo":"dub"); $("#gate-"+(key==="dub"?"sfo":"dub")).focus();}
    });
  }
}

function segRow(dir, seg){
  return `<div class="seg">
    <span class="dir">${dir}</span>
    <span>
      <span class="when">${fmtDate(seg.dep).toUpperCase()} · <span class="time">${fmtTime(seg.dep)}</span></span>
      <span class="fl">${al(seg.airline)} ${seg.airline}${seg.flight} · ${fmtDur(seg.dur)} · arrives ${fmtTime(seg.arr)}</span>
    </span></div>`;
}

function carriersLine(r){
  return r.carriers.map(c=>c.name).join(" · ");
}

function chart(r){
  const max = Math.max(...r.monthly.map(m=>m.min));
  const cheapestYm = r.cheapest.dep.slice(0,7);
  const cols = r.monthly.map(m=>{
    const h = Math.max(3, Math.round(m.min/max*100));
    const isMin = m.min===Math.min(...r.monthly.map(x=>x.min));
    return `<div class="col${isMin?" cheapest":""}" data-tip="${m.label}: ${money(m.min)} cheapest (${money(m.min/3)}/person)">
      <span class="bar" style="height:${h}%"><span class="blab">${money(m.min)}</span></span>
    </div>`;
  }).join("");
  const ax = r.monthly.map(m=>{const [mo,y]=m.label.split(" ");return `<span>${mo}<b>&rsquo;${y.slice(2)}</b></span>`;}).join("");
  return `<div class="chartcard">
    <div class="chart">${cols}</div>
    <div class="xaxis">${ax}</div>
  </div>`;
}

function table(r){
  const rows = r.cheapDates.map(d=>`<tr>
    <td class="dt">${fmtDate(d.dep)} <span style="color:var(--faint)">&rarr;</span> ${fmtDate(d.ret)}</td>
    <td class="price">${money(d.price)}</td>
    <td class="fl">${d.oc}${d.of} <span style="color:var(--faint)">/</span> ${d.bc}${d.bf}</td>
    <td><span class="pill">nonstop</span></td>
  </tr>`).join("");
  return `<div class="tablecard"><div class="tbl-scroll"><table>
    <thead><tr><th>Depart &rarr; Return (5 nights)</th><th>Total · 3 seats</th><th>Flights out / back</th><th></th></tr></thead>
    <tbody>${rows}</tbody></table></div></div>`;
}

function select(key){
  const r = FLIGHTS.routes[key];
  document.documentElement.style.setProperty("--ac", AC[key]);
  document.documentElement.style.setProperty("--ac-soft", ACSOFT[key]);
  for(const k of ["dub","sfo"]) $("#gate-"+k).setAttribute("aria-selected", String(k===key));

  const c = r.cheapest;
  const monthsAtFloor = r.cheapDates.length;
  const cheapMonth = r.monthly.reduce((a,b)=>b.min<a.min?b:a);
  const panel = $("#panel");
  panel.innerHTML = `
    <section class="pass">
      <div class="pass-stub">
        <span class="lbl">Boarding pass · Cheapest nonstop</span>
        <span class="stamp">Best of next 12 months</span>
      </div>
      <div class="pass-body">
        <div class="route-line">
          <div class="port"><div class="code">BOS</div><div class="name">Boston</div></div>
          <div class="path">
            <span class="dur">${fmtDur(c.out.dur)}</span>
            <span class="track"><span class="plane">&#9992;</span></span>
            <span class="nonstop">Nonstop</span>
          </div>
          <div class="port"><div class="code">${r.code}</div><div class="name">${r.city}</div></div>
          <div class="fare">
            <div class="amt" id="fareAmt">${money(c.price)}</div>
            <div class="meta">round trip · <b>3 seats</b><br>${money(c.pp)} / person</div>
          </div>
        </div>
        <hr class="perf">
        <div class="segs">
          ${segRow("Depart", c.out)}
          ${segRow("Return", c.back)}
        </div>
      </div>
    </section>

    <div class="stats">
      <div class="stat"><div class="k">Cheapest total</div><div class="v" style="color:var(--ac)">${money(c.price)}</div></div>
      <div class="stat"><div class="k">Per person</div><div class="v">${money(c.pp)}</div></div>
      <div class="stat"><div class="k">Cheapest month</div><div class="v">${cheapMonth.label.split(" ")[0]} <small>${money(cheapMonth.min)}</small></div></div>
      <div class="stat"><div class="k">Nonstop carriers</div><div class="v" style="font-size:clamp(15px,3vw,19px);line-height:1.15">${carriersLine(r)}</div></div>
    </div>

    <div class="sec"><h2>When it's cheapest</h2><span class="note">lowest nonstop 3-seat fare by departure month</span></div>
    ${chart(r)}

    <div class="sec"><h2>Cheapest dates</h2><span class="note">${monthsAtFloor} departures within ~2% of the floor</span></div>
    ${table(r)}

    <div class="sec"><h2>Before you book</h2></div>
    <div class="notes">
      <h3>Fine print</h3>
      <ul>
        <li><b>Bags not included.</b> Prices are the base fare for 3 economy seats; the Google Flights data does not add checked-bag fees. Confirm the fare brand + bag cost with the airline before booking.</li>
        <li><b>Nonstop, both directions</b>, priced so all 3 seats are available on one itinerary. ${key==="dub"?"Only Aer Lingus flies BOS&ndash;Dublin nonstop with 3 economy seats at the low fare (one rotation per day).":"JetBlue, United, and Delta all fly BOS&ndash;SFO nonstop, with several departures a day."}</li>
        <li><b>Estimates that drift.</b> Fares change constantly; the cheapest date was re-checked 3&times; and held, but verify at booking time.</li>
      </ul>
    </div>`;

  const amt = $("#fareAmt");
  amt.classList.remove("flip"); void amt.offsetWidth; amt.classList.add("flip");
  bindTips();
}

// chart tooltip
let tipT;
function bindTips(){
  const tip = $("#tip");
  document.querySelectorAll(".col[data-tip]").forEach(col=>{
    const show = e=>{
      const [head,...rest]=col.dataset.tip.split(": ");
      tip.innerHTML = `<span class="tp">${head}</span><br>${rest.join(": ")}`;
      tip.classList.add("on");
      const pt = e.touches? e.touches[0]:e;
      let x=pt.clientX+14, y=pt.clientY-10;
      if(x+240>innerWidth) x=pt.clientX-226;
      tip.style.left=x+"px"; tip.style.top=y+"px";
    };
    col.addEventListener("mousemove",show);
    col.addEventListener("mouseleave",()=>tip.classList.remove("on"));
    col.addEventListener("touchstart",e=>{show(e); clearTimeout(tipT); tipT=setTimeout(()=>tip.classList.remove("on"),2200);},{passive:true});
  });
}

// theme toggle
function initTheme(){
  const btn = $("#themeBtn");
  const sys = ()=>matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";
  let cur = null; // null = follow system
  const label = ()=>{const eff = cur||sys(); btn.textContent = eff==="dark"?"☀ Light":"☾ Dark";};
  const apply = ()=>{ if(cur) document.documentElement.setAttribute("data-theme",cur); else document.documentElement.removeAttribute("data-theme"); label(); };
  btn.addEventListener("click",()=>{ const eff=cur||sys(); cur = eff==="dark"?"light":"dark"; apply(); });
  matchMedia("(prefers-color-scheme:dark)").addEventListener?.("change",label);
  apply();
}

FLIGHTS && (function(){
  const g = FLIGHTS.generated;
  $("#foot").innerHTML = `Data from Google Flights via the fli tool · swept ${g} · BOS origin · economy · party of 3 (2 adults + 1 child, age 7)`;
  renderGates();
  initTheme();
  select("dub");
})();
</script>
