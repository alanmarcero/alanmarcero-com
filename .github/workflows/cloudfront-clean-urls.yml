name: Enable clean URLs (generic .html rewrite)

# One-time (or re-runnable) workflow that creates/updates a CloudFront Function
# to serve clean URLs across the whole site:
#   * Any extension-less path `/foo` is rewritten to `/foo.html` at the edge.
#   * Any `/foo.html` is 301-redirected to `/foo` for canonicalization.
#   * `/` and `/index.html` pass through untouched.
#   * `/api/*` is defensively skipped (it also uses a separate cache behavior).
#   * Anything with an extension (.js/.css/.webp/.zip/.png/.svg/etc.) passes through.
#
# After this ships, adding a new top-level page (e.g. `/nyc`) is a pure-git task:
# drop `nyc.html` in the repo, add it to `vite.config.js`, push. No AWS calls.
#
# CloudFront Functions billing: $0.10 per 1M invocations, no cold start.

on:
  workflow_dispatch:

jobs:
  clean-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Write function source
        run: |
          cat > clean-urls.js <<'EOF'
          function handler(event) {
            var request = event.request;
            var uri = request.uri;

            // /api uses a separate cache behavior; skip defensively anyway.
            if (uri.indexOf('/api') === 0) return request;

            // Root and index.html: leave alone.
            if (uri === '/' || uri === '/index.html') return request;

            // Canonicalize: 301 any /foo.html to the clean /foo.
            if (uri.length > 5 && uri.slice(-5) === '.html') {
              return {
                statusCode: 301,
                statusDescription: 'Moved Permanently',
                headers: {
                  location: { value: uri.slice(0, -5) },
                  'cache-control': { value: 'public, max-age=3600' }
                }
              };
            }

            // Extension-less path -> transparently rewrite to .html at origin.
            // Static assets all carry an extension (.js/.css/.webp/.zip/...)
            // and pass through untouched.
            if (uri.indexOf('.') === -1) {
              var stripped = uri.replace(/\/$/, '');
              request.uri = stripped + '.html';
              return request;
            }

            return request;
          }
          EOF

      - name: Create or update CloudFront Function
        id: fn
        run: |
          FN_NAME="alanmarcero-clean-urls"
          FN_CONFIG='{"Comment":"Generic clean-URL rewrite + .html canonicalization","Runtime":"cloudfront-js-2.0"}'

          if aws cloudfront describe-function --name "$FN_NAME" >/dev/null 2>&1; then
            echo "Function exists; updating source."
            ETAG=$(aws cloudfront describe-function --name "$FN_NAME" --query 'ETag' --output text)
            aws cloudfront update-function \
              --name "$FN_NAME" \
              --if-match "$ETAG" \
              --function-config "$FN_CONFIG" \
              --function-code fileb://clean-urls.js
          else
            echo "Function does not exist; creating."
            aws cloudfront create-function \
              --name "$FN_NAME" \
              --function-config "$FN_CONFIG" \
              --function-code fileb://clean-urls.js
          fi

          # Publish DEVELOPMENT -> LIVE
          ETAG=$(aws cloudfront describe-function --name "$FN_NAME" --query 'ETag' --output text)
          aws cloudfront publish-function --name "$FN_NAME" --if-match "$ETAG"

          FN_ARN=$(aws cloudfront describe-function \
            --name "$FN_NAME" \
            --stage LIVE \
            --query 'FunctionSummary.FunctionMetadata.FunctionARN' \
            --output text)
          echo "FN_ARN=$FN_ARN" >> "$GITHUB_OUTPUT"
          echo "Function published: $FN_ARN"

      - name: Associate function with default cache behavior
        run: |
          aws cloudfront get-distribution-config \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --output json > cf-config.json

          jq -r '.ETag' cf-config.json > etag.txt
          jq '.DistributionConfig' cf-config.json > dist-config.json

          FN_ARN="${{ steps.fn.outputs.FN_ARN }}"

          # Idempotent: replace any existing viewer-request association on the
          # default behavior with our function.
          jq --arg arn "$FN_ARN" '
            .DefaultCacheBehavior.FunctionAssociations = {
              "Quantity": 1,
              "Items": [{"FunctionARN": $arn, "EventType": "viewer-request"}]
            }
          ' dist-config.json > dist-config-updated.json

          ETAG=$(cat etag.txt)
          aws cloudfront update-distribution \
            --id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --if-match "$ETAG" \
            --distribution-config file://dist-config-updated.json

          echo "CloudFront distribution update initiated"

      - name: Summary
        run: |
          echo "=== Clean URLs enabled (generic) ==="
          echo "Wait ~5-15 min for CloudFront propagation, then:"
          echo "  https://alanmarcero.com/arcade       -> serves arcade.html (200)"
          echo "  https://alanmarcero.com/neworleans   -> serves neworleans.html (200)"
          echo "  https://alanmarcero.com/<anything>   -> serves <anything>.html if it exists, else 404"
          echo "  https://alanmarcero.com/<anything>.html -> 301 to /<anything>"
          echo ""
          echo "Rollback: unset FunctionAssociations on the default behavior, or"
          echo "run 'aws cloudfront delete-function --name alanmarcero-clean-urls'."
