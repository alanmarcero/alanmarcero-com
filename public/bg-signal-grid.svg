<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- S2 (signal-path theme): tileable page background. Charcoal base,
       faint module grid, sparse phosphor traces. Baked palette per
       coord-thread contract: charcoal #0a0c0d, phosphor #4af2a4,
       amber #ffb454 (low opacity throughout — this sits under body text). -->
  <rect width="400" height="400" fill="#0a0c0d"/>
  <g stroke="#4af2a4" stroke-width="1" opacity="0.05">
    <path d="M0 0H400M0 100H400M0 200H400M0 300H400" fill="none"/>
    <path d="M0 0V400M100 0V400M200 0V400M300 0V400" fill="none"/>
  </g>
  <g fill="#4af2a4" opacity="0.08">
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="300" cy="100" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/>
    <circle cx="300" cy="300" r="1.5"/>
    <circle cx="200" cy="200" r="1.5"/>
  </g>
  <!-- one faint scope trace per tile; starts and ends at y=200 on the
       seams so horizontal tiling is continuous -->
  <path d="M0 200 C 40 200 50 140 90 140 S 150 250 200 250 S 280 120 320 120 S 380 200 400 200"
        fill="none" stroke="#4af2a4" stroke-width="1.25" opacity="0.07"/>
  <circle cx="320" cy="120" r="2.5" fill="#ffb454" opacity="0.12"/>
</svg>
