<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0c0d" />
    <meta name="robots" content="noindex" />
    <title>Signal Lost — Alan Marcero</title>
    <style>
      :root {
        --bg: #0a0c0d;
        --phosphor: #4af2a4;
        --amber: #ffb454;
        --ink: #e8edee;
        --ink-muted: #99a6ab;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        text-align: center;
        background: var(--bg);
        background-image: radial-gradient(120% 80% at 50% 0%, rgba(74, 242, 164, 0.06), transparent 60%);
        color: var(--ink);
        font-family: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 30rem; }
      .scope { width: 100%; height: 56px; margin-bottom: 1.5rem; color: var(--phosphor); opacity: 0.6; }
      .scope path { stroke-dasharray: 600; animation: trace 3.2s linear infinite; }
      @keyframes trace { from { stroke-dashoffset: 600; } to { stroke-dashoffset: 0; } }
      .code {
        margin: 0;
        font-size: clamp(3rem, 8vw, 5rem);
        font-weight: 700;
        letter-spacing: 0.12em;
        color: var(--phosphor);
        text-shadow: 0 0 26px rgba(74, 242, 164, 0.35);
      }
      h1 {
        margin: 0.4rem 0 1.25rem;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--amber);
      }
      p { margin: 0 0 1.75rem; color: var(--ink-muted); line-height: 1.65; }
      a.home {
        display: inline-block;
        padding: 0.7rem 1.4rem;
        border-radius: 4px;
        background: var(--phosphor);
        color: var(--bg);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.82rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: box-shadow 160ms ease;
      }
      a.home:hover { box-shadow: 0 0 24px rgba(74, 242, 164, 0.45); }
      @media (prefers-reduced-motion: reduce) {
        .scope path { animation: none; stroke-dasharray: none; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <svg class="scope" viewBox="0 0 440 60" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 30 L150 30 L165 10 L180 50 L195 30 L440 30" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
      </svg>
      <p class="code">404</p>
      <h1>Signal Lost</h1>
      <p>That patch isn't on the rack — the cable came loose somewhere. Let's route you back to the console.</p>
      <a class="home" href="/">Back to console</a>
    </div>
  </body>
</html>
